name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev libcurl4-openssl-dev libssl-dev

      - name: Install R packages
        run: |
          Rscript -e '
            install.packages(c(
              "shiny", "shinydashboard", "shinyjs",
              "rgdal", "raster", "sp", "pxR",
              "leaflet", "plotKML", "highcharter", "dplyr",
              "shinytest", "testthat", "rjson"
            ), repos = "https://cloud.r-project.org/")
          '

      - name: Run tests
        run: Rscript -e 'testthat::test_file("test-shiny.R")'
